<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — DineFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a0a00 0%, #3d1f0d 100%);
    }
    .login-box {
      background: #fff;
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }
    .login-logo {
      font-size: 2.5rem;
      margin-bottom: 8px;
    }
    .login-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      color: #3d1f0d;
      margin-bottom: 4px;
    }
    .login-sub {
      color: #999;
      font-size: 0.9rem;
      margin-bottom: 32px;
    }
    .login-input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #f5e6d0;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      margin-bottom: 16px;
      box-sizing: border-box;
      transition: border 0.2s;
    }
    .login-input:focus {
      outline: none;
      border-color: #c8963e;
    }
    .login-btn {
      width: 100%;
      padding: 14px;
      background: #3d1f0d;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }
    .login-btn:hover { background: #c8963e; }
    .login-error {
      color: #b33a1e;
      font-size: 0.9rem;
      margin-top: 12px;
      display: none;
    }
    .back-link {
      display: block;
      margin-top: 20px;
      color: #999;
      font-size: 0.85rem;
      text-decoration: none;
    }
    .back-link:hover { color: #c8963e; }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-box">
      <div class="login-logo">⬡</div>
      <h1 class="login-title">Admin Login</h1>
      <p class="login-sub">DineFlow Management System</p>
      <input type="text" class="login-input" id="login-user" placeholder="Username"/>
      <input type="password" class="login-input" id="login-pass" placeholder="Password"/>
      <button class="login-btn" onclick="doLogin()">🔐 Login</button>
      <p class="login-error" id="login-error">❌ Invalid username or password</p>
      <a href="index.html" class="back-link">← Back to Menu</a>
    </div>
  </div>

  <script>
    // Check if already logged in
    if (sessionStorage.getItem('adminLoggedIn') === 'true') {
      window.location.href = 'admin.html';
    }

    function doLogin() {
      const user = document.getElementById('login-user').value.trim();
      const pass = document.getElementById('login-pass').value.trim();

      // Admin credentials
      if (user === 'admin' && pass === 'Admin@123') {
        sessionStorage.setItem('adminLoggedIn', 'true');
        window.location.href = 'admin.html';
      } else {
        document.getElementById('login-error').style.display = 'block';
      }
    }

    // Allow Enter key
    document.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
